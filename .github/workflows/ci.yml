name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Test (core + all surfaces)
        run: npm test
      - name: Build extension
        run: npm run build --workspace @thirsty/browser-extension
      - name: Package (smoke)
        run: npm run package --workspace @thirsty/browser-extension
